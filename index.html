<!DOCTYPE html>
<html lang="sv">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lovisa Celander</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #f6f1ed;
      --bg-section: #ede4da;
      --text-main: #1f1f1f;
      --text-soft: #6f665b;
      --white: #ffffff;
    }

    body {
      margin: 0;
      background: var(--bg-main);
      color: var(--text-main);
      font-family: 'Montserrat', sans-serif;
    }

    /* ===== STICKY HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      text-align: center;
      padding: 100px 20px 40px;
      background: linear-gradient(
        to bottom,
        rgba(246,241,237,0.95),
        rgba(246,241,237,0.85),
        rgba(246,241,237,0)
      );
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .header.hidden {
      opacity: 0;
      transform: translateY(-40px);
      pointer-events: none;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4.6rem;
      font-weight: 400;
      margin: 0;
      letter-spacing: 2px;
    }

    nav {
      margin-top: 35px;
    }

    nav a {
      text-decoration: none;
      color: var(--text-soft);
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0 18px;
      transition: opacity 0.3s ease;
    }

    nav a:hover {
      opacity: 0.6;
    }

    /* ===== SECTION ===== */
    .folders-cloud {
      max-width: 1200px;
      margin: 160px auto;
      padding: 120px 40px;
      background: var(--bg-section);
      border-radius: 70px;
    }

    .folders {
      display: flex;
      justify-content: center;
      gap: 80px;
      flex-wrap: wrap;
    }

    /* ===== CARDS ===== */
    .folder {
      background: var(--white);
      width: 220px;
      padding: 48px 20px;
      border-radius: 38px;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      transform: scale(0.85);
      opacity: 0;
      transition:
        transform 0.8s cubic-bezier(.19,1,.22,1),
        opacity 0.6s ease,
        box-shadow 0.6s ease;
    }

    .folder.in-view {
      transform: scale(1);
      opacity: 1;
      box-shadow: 0 35px 70px rgba(0,0,0,0.2);
    }

    .folder:hover {
      transform: scale(1.05);
    }

    .folder-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.65rem;
      letter-spacing: 1px;
      margin: 0;
      color: var(--text-main);
    }

    /* ===== CONTACT ===== */
    #contact {
      padding: 140px 20px 180px;
      text-align: center;
    }

    #contact h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 400;
      margin-bottom: 34px;
    }

    .contact-box {
      background: var(--white);
      max-width: 520px;
      margin: 0 auto;
      padding: 50px;
      border-radius: 40px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.18);
    }

    .contact-box p {
      margin: 0;
      font-size: 1.05rem;
    }

    .contact-box a {
      color: var(--text-soft);
      font-weight: 600;
      text-decoration: none;
    }

    .contact-box a:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 3.4rem;
      }
    }
  </style>
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NXQ526ZN"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->

  <!-- HEADER -->
  <header class="header" id="siteHeader">
    <h1>Lovisa Celander</h1>
    <nav>
      <a href="om-mig.html">Om mig</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="#cv">CV</a>
      <a href="#projekt">Projekt</a>
      <a href="#contact">Kontakt</a>
    </nav>
  </header>

  <!-- CARDS -->
  <section class="folders-cloud">
    <div class="folders">
      <a href="#cv" class="folder">
        <p class="folder-title">CV</p>
      </a>

      <a href="portfolio.html" class="folder">
        <p class="folder-title">Portfolio</p>
      </a>

      <a href="#projekt" class="folder">
        <p class="folder-title">Projekt</p>
      </a>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Let’s connect</h2>
    <div class="contact-box">
      <p></p>
      <p style="margin-top:18px;">
        <a href="mailto:celanderlovisa@gmail.com">celanderlovisa@gmail.com</a>
      </p>
    </div>
  </section>

  <!-- SCROLL EFFECTS -->
  <script>
    /* Hide header on scroll */
    const header = document.getElementById('siteHeader');
    let lastScroll = 0;

    window.addEventListener('scroll', () => {
      const currentScroll = window.scrollY;
      if (currentScroll > 120) {
        header.classList.add('hidden');
      } else {
        header.classList.remove('hidden');
      }
      lastScroll = currentScroll;
    });

    /* Cards animation */
    const observer = new IntersectionObserver(
      entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in-view');
          }
        });
      },
      { threshold: 0.4 }
    );

    document.querySelectorAll('.folder').forEach(card => {
      observer.observe(card);
    });
  </script>

</body>
</html>
