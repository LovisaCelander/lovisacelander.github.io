<!DOCTYPE html>
<html lang="sv">
<head>
  <script>
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-NXQ526ZN');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lovisa Celander</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #fdf8f3;       /* original beige bakgrund */
      --card-bg: #fffefc;       /* ljus beige kort */
      --card-hover-bg: #e6dfd1; /* mörkare beige vid hover */
      --text-main: #4b4637;     /* mörk text */
      --text-soft: #7a6f57;     /* mjuk text */
    }

    body {
      margin: 0;
      background: var(--bg-main);
      color: var(--text-main);
      font-family: 'Montserrat', sans-serif;
      padding-top: 200px; /* plats för header */
    }

    /* ===== HEADER ===== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      text-align: center;
      padding: 60px 20px 20px;
      background: var(--bg-main);
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .header.hidden {
      transform: translateY(-120%);
      opacity: 0;
      pointer-events: none;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4.6rem;
      margin: 0;
      letter-spacing: 2px;
      color: var(--text-main);
    }

    nav {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    nav a {
      text-decoration: none;
      color: var(--text-soft);
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0 18px;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: var(--text-main);
    }

    /* ===== CARDS ===== */
    .folders-cloud {
      max-width: 1300px;
      margin: 100px auto 0;
      padding: 0 40px 120px;
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .folder {
      background: var(--card-bg);
      width: 200px;
      padding: 48px 20px;
      border-radius: 38px;
      text-align: center;
      text-decoration: none;
      color: var(--text-main);
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 1px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.1);
      transition: all 0.4s ease;
      transform: scale(0.9);
      opacity: 0;
    }

    .folder.vault-card {
      background: #1a1a17;
      color: #fdf8f3;
    }

    .folder.in-view {
      transform: scale(1);
      opacity: 1;
    }

    .folder:hover {
      background: var(--card-hover-bg);
      transform: scale(1.05);
      box-shadow: 0 35px 70px rgba(0,0,0,0.2);
      cursor: pointer;
    }

    .folder.vault-card:hover {
      background: #000000;
    }

    /* ===== CONTACT ===== */
    #contact {
      padding: 140px 20px 180px;
      text-align: center;
    }

    #contact h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      margin-bottom: 34px;
      color: var(--text-main);
    }

    .contact-box {
      background: var(--card-bg);
      max-width: 520px;
      margin: 0 auto;
      padding: 50px;
      border-radius: 40px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.18);
      color: var(--text-main);
    }

    .contact-box p {
      margin: 0;
      font-size: 1.05rem;
    }

    .contact-box a {
      color: var(--text-main);
      font-weight: 600;
      text-decoration: none;
    }

    .contact-box a:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 3.4rem;
      }

      .folders-cloud {
        gap: 20px;
      }
      
      .folder {
        width: 160px;
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NXQ526ZN"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>

  <header class="header" id="siteHeader">
    <h1>Lovisa Celander</h1>
    <nav>
      <a href="om-mig.html">Om mig</a>
      <a href="#contact">Kontakt</a>
    </nav>
  </header>

  <section class="folders-cloud">
    <a href="#cv" class="folder">CV</a>
    <a href="portfolio.html" class="folder">Portfolio</a>
    <a href="#projekt" class="folder">Projekt</a>
    <a href="lead-magnet.html" class="folder vault-card">Steal My <br><span class="italic">Thinking.</span></a>
  </section>

  <section id="contact">
    <h2>Let’s connect.</h2>
    <div class="contact-box">
      <p>For collaborations, inquiries, or just to say hi.</p>
      <p style="margin-top:18px;">
        <a href="mailto:celanderlovisa@gmail.com">celanderlovisa@gmail.com</a>
      </p>
    </div>
  </section>

  <script>
    const header = document.getElementById('siteHeader');
    let lastScroll = 0;

    window.addEventListener('scroll', () => {
      const currentScroll = window.scrollY;

      if (currentScroll > lastScroll && currentScroll > 120) {
        header.classList.add('hidden');
      } else if (currentScroll < lastScroll) {
        header.classList.remove('hidden');
      }

      lastScroll = currentScroll;
    });

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
        }
      });
    }, { threshold: 0.2 });

    document.querySelectorAll('.folder').forEach(card => observer.observe(card));
  </script>
</body>
</html>
