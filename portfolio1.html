<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Selected Cases — Lovisa Celander</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-main: #fdf8f3;       
      --text-main: #1a1a17;
    }

    * { box-sizing: border-box; } 
    html { scroll-behavior: smooth; }

    body { 
      margin: 0; 
      background: var(--bg-main); 
      color: var(--text-main); 
      font-family: 'Montserrat', sans-serif; 
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- CUSTOM CURSOR --- */
    #cursor {
      position: fixed;
      top: 0; left: 0;
      width: 110px;
      height: 110px;
      background: rgba(255, 255, 255, 0.98);
      pointer-events: none;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.3s ease, border-radius 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), width 0.4s ease, height 0.4s ease;
      border-radius: 48% 52% 46% 54% / 55% 45% 55% 45%; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.04);
    }

    #cursor span {
      font-size: 11px; font-weight: 600; color: #000;
      text-transform: lowercase; opacity: 0; transition: opacity 0.2s;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.5px;
    }

    .case-card:hover { cursor: none; }
    .case-card:hover ~ #cursor { transform: translate(-50%, -50%) scale(1); }
    .case-card:hover ~ #cursor span { opacity: 1; }

    /* FORMER PER PROJECT */
    .shape-photograph:hover ~ #cursor { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
    .shape-bovou:hover ~ #cursor { border-radius: 20% 40% 20% 40% / 40% 20% 40% 20%; }
    .shape-ophelia:hover ~ #cursor { border-radius: 50% 50% 30% 70% / 60% 40% 60% 40%; width: 140px; height: 90px; }
    .shape-justglow:hover ~ #cursor { border-radius: 20% 80% 20% 80% / 80% 20% 80% 20%; width: 130px; height: 100px; }
    .shape-commonclouds:hover ~ #cursor { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }

    /* --- NAVIGATION --- */
    .header { 
      padding: 40px 60px; display: flex; position: fixed; width: 100%; top: 0; z-index: 5000;
      transition: transform 0.4s ease;
    }
    .header-hidden { transform: translateY(-100%); }
    .back-link { text-decoration: none; color: var(--text-main); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
    .back-link::before { content: '['; margin-right: 8px; opacity: 0; transition: 0.3s; }
    .back-link::after { content: ']'; margin-left: 8px; opacity: 0; transition: 0.3s; }
    .back-link:hover::before, .back-link:hover::after { opacity: 0.5; }

    /* --- INTRO SECTION --- */
    .cases-intro { 
      height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
      background: var(--bg-main); position: relative; z-index: 10;
    }
    .cases-intro h1 { 
      font-family: 'Playfair Display'; font-size: clamp(3rem, 8vw, 5rem); font-weight: 400; font-style: italic; margin: 0; 
    }

    /* --- STACK --- */
    .case-stack { width: 100%; position: relative; }
    .case-wrapper { height: 100vh; position: sticky; top: 0; overflow: hidden; background: #000; }
    .case-card { width: 100%; height: 100%; position: relative; }
    .case-image { width: 100%; height: 100%; object-fit: cover; object-position: right center; }
    .case-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 50%); }
    
    .case-info { position: absolute; bottom: 80px; left: 80px; z-index: 2; color: #fff; pointer-events: none; }
    .case-info h2 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 6vw, 4.5rem); font-style: italic; margin: 0; font-weight: 400; }

    /* --- FOOTER --- */
    .footer { padding: 120px 60px; text-align: center; background: var(--bg-main); position: relative; z-index: 2000; }
    .scroll-up-btn { background: none; border: none; color: var(--text-main); font-family: 'Montserrat', sans-serif; font-size: 0.7rem; text-transform: uppercase; cursor: pointer; }
    .scroll-up-btn span.fancy { font-family: 'Playfair Display'; font-style: italic; text-transform: lowercase; font-size: 1.1rem; }

    @media (max-width: 900px) { #cursor { display: none; } .case-info { left: 40px; bottom: 60px; } }
  </style>
</head>
<body>

  <header class="header" id="mainHeader">
    <a href="index.html" class="back-link" onclick="if(window.history.length > 1) { event.preventDefault(); window.history.back(); }">Go back</a>
  </header>

  <main>
    <section class="cases-intro">
      <span style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 4px; opacity: 0.4; font-weight: 700; display: block; margin-bottom: 15px;">02 / Selection</span>
      <h1>Selected Cases</h1>
    </section>

    <div class="case-stack">
      
      <section class="case-wrapper">
        <div class="case-card shape-photograph" onclick="location.href='fotografiska.html'">
          <img src="fotografiska3.png" class="case-image">
          <div class="case-info">
            <span style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 10px;">01</span>
            <h2>Fotografiska</h2>
            <p style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;">Inclusive AI Experience</p>
          </div>
        </div>
        <div id="cursor"><span>view case :)</span></div>
      </section>

      <section class="case-wrapper">
        <div class="case-card shape-bovou" onclick="location.href='bovou.html'">
          <img src="bovou1.png" class="case-image">
          <div class="case-info">
            <span style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 10px;">02</span>
            <h2>Bovou</h2>
            <p>Ad Creative & Paid Performance</p>
          </div>
        </div>
        <div id="cursor"><span>view case :)</span></div>
      </section>

      <section class="case-wrapper">
        <div class="case-card shape-ophelia" onclick="location.href='ophelia.html'">
          <img src="ophelia.portfolio2.png" class="case-image">
          <div class="case-info">
            <span style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 10px;">03</span>
            <h2>Ophelia</h2>
            <p>Founder & Creative Direction</p>
          </div>
        </div>
        <div id="cursor"><span>view case :)</span></div>
      </section>

      <section class="case-wrapper">
        <div class="case-card shape-justglow" onclick="location.href='justglow.html'">
          <img src="justglow3.png" class="case-image">
          <div class="case-info">
            <span style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 10px;">04</span>
            <h2>Just Glow</h2>
            <p>Paid Socials</p>
          </div>
        </div>
        <div id="cursor"><span>view case :)</span></div>
      </section>

      <section class="case-wrapper">
        <div class="case-card shape-commonclouds" onclick="location.href='commonclouds.html'">
          <img src="commonclouds1.png" class="case-image">
          <div class="case-info">
            <span style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 10px;">05</span>
            <h2>Common Clouds</h2>
            <p>Growth & SEO</p>
          </div>
        </div>
        <div id="cursor"><span>view case :)</span></div>
      </section>

    </div>

    <footer class="footer">
      <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="scroll-up-btn">
        Scroll to <span class="fancy">top</span> ↑
      </button>
    </footer>
  </main>

  <script>
    const cursors = document.querySelectorAll('#cursor');
    
    document.addEventListener('mousemove', (e) => {
      cursors.forEach(c => {
        c.style.left = e.clientX + 'px';
        c.style.top = e.clientY + 'px';
      });
    });

    let lastScrollY = window.scrollY;
    const header = document.getElementById('mainHeader');
    window.addEventListener('scroll', () => {
      if (window.scrollY > lastScrollY && window.scrollY > 100) {
        header.classList.add('header-hidden');
      } else {
        header.classList.remove('header-hidden');
      }
      lastScrollY = window.scrollY;
    });
  </script>

</body>
</html>
